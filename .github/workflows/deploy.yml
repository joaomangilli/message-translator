name: Deploy

# Deploy SOMENTE manual: escolha o ambiente no "Run workflow". Não roda em push.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente de deploy
        type: choice
        required: true
        options:
          - qa
          - prod

# OIDC: assume uma role na AWS sem chaves de longa duração.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

# Roda as JS actions (checkout, setup-node, configure-aws-credentials) em Node.js 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: cdk deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ⚠️ TEMPORÁRIO — apenas para depurar o ARN inválido. REVELA o secret no log
      # (quebra o mascaramento do GitHub de propósito). REMOVER após o diagnóstico.
      - name: DEBUG TEMP — inspecionar AWS_DEPLOY_ROLE_ARN
        env:
          ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          echo "comprimento (bytes): ${#ARN}"
          echo "casa o formato esperado? (arn:aws:iam::<12 dígitos>:role/...)"
          printf '%s' "$ARN" | grep -qE '^arn:aws:iam::[0-9]{12}:role/.+$' && echo "  -> OK" || echo "  -> NÃO"
          echo "bytes (od -c, revela espaços/quebras de linha):"
          printf '%s' "$ARN" | od -An -c

      - name: Configurar credenciais AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: CDK deploy
        env:
          # Ambiente escolhido no dispatch; namespaceia os recursos no CDK.
          ENVIRONMENT: ${{ inputs.environment }}
          # Nome do secret (Secrets Manager) por GitHub Environment; se vazio, o
          # bin/app.ts cai no default por ambiente (message-translator/<env>/jwt-secret).
          JWT_SECRET_NAME: ${{ vars.JWT_SECRET_NAME }}
        run: npx cdk deploy "MessageTranslator-$ENVIRONMENT" --require-approval never
